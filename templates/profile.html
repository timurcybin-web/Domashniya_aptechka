<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль — Домашняя Аптечка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width:480px;">
    <div class="card shadow-sm p-4">
        <h4 class="mb-4">⚙️ Профиль</h4>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Логин</label>
                <input type="text" class="form-control" value="{{ current_user.username }}" disabled>
            </div>
            <div class="mb-3">
                <label class="form-label">Email для уведомлений</label>
                <input type="email" name="email" class="form-control"
                       value="{{ current_user.email or '' }}"
                       placeholder="example@mail.ru">
                <div class="form-text">На этот адрес будут приходить напоминания об истекающих препаратах.</div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Назад</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
