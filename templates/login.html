<!DOCTYPE html>
<html>
<head>
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <h2>Вход в аптечку</h2>
            <form method="POST">
                <input type="text" name="username" placeholder="Логин" class="form-control mb-2" required>
                <input type="password" name="password" placeholder="Пароль" class="form-control mb-2" required>
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
            <p class="mt-3 text-center">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
        </div>
    </div>
</body>
</html>
